<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── PWA manifest ──────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Icons ─────────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── iOS splash screens ────────────────────────────────────────────── -->
    <!-- One entry covers all modern iPhones/iPads; Safari picks the closest fit -->
    <link rel="apple-touch-startup-image" href="/Icon-splash.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/Icon-splash.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/Icon-splash.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/Icon-splash.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/Icon-splash.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/Icon-splash.png" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/Icon-splash.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/Icon-splash.png" media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/Icon-splash.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)" />

    <!-- ── Theme / status-bar ────────────────────────────────────────────── -->
    <!-- Default to Sage accent; ThemeApplier in React updates this dynamically -->
    <meta name="theme-color" content="#5B7B7A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- default = white status bar; black-translucent extends behind notch -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Austin's Diary" />

    <!-- ── SEO / description ─────────────────────────────────────────────── -->
    <meta
      name="description"
      content="A private caregiving journal for tracking behavior, sleep, diet, and daily routines."
    />

    <title>Austin's Diary</title>

    <!-- ── Fonts ─────────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,700&family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Merriweather:wght@300;400;700&display=swap"
      rel="stylesheet"
    />

    <!-- ── Service Worker registration ───────────────────────────────────── -->
    <!--
      Installed PWAs (home-screen apps) rarely get a hard reload — the OS
      suspends/resumes them instead of reloading. Without the logic below, a
      new service worker can finish installing and activating in the
      background, but the already-open page keeps running the OLD JS bundle
      forever, so fixes never visibly take effect until the user manually
      force-quits and reopens the app. `controllerchange` fires the moment the
      new worker takes over — we use that as the signal to reload the page
      exactly once so the fresh bundle loads automatically.
    -->
    <script>
      if ('serviceWorker' in navigator) {
        let refreshing = false
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return
          refreshing = true
          window.location.reload()
        })

        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((registration) => {
            // Re-check for updates whenever the app regains focus — covers
            // PWAs that were merely resumed from the background, not reloaded.
            document.addEventListener('visibilitychange', () => {
              if (document.visibilityState === 'visible') {
                registration.update().catch(() => {})
              }
            })
          }).catch((err) => {
            console.warn('[SW] Registration failed:', err)
          })
        })
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
